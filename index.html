<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Check-in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #5c58f6; --primary-light: #eff0fe; --primary-dark: #4a46c6;
      --green: #00b075; --green-light: #e6f7f1;
      --red: #ef4444; --red-light: #fef2f2;
      --amber: #f59e0b; --amber-light: #fffbeb;
      --gray-50: #f8fafc; --gray-200: #e2e8f0; --gray-400: #94a3b8;
      --gray-600: #475569; --gray-800: #1e293b; --gray-900: #0f172a;
      --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(92,88,246,0.10), 0 1px 4px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(92,88,246,0.14), 0 2px 8px rgba(0,0,0,0.08);
      --radius: 16px; --radius-sm: 10px;
    }
    html, body { width: 100%; height: 100%; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--gray-50); color: var(--gray-800); display: flex; flex-direction: column; min-height: 100dvh; }
    .topbar { background: var(--white); border-bottom: 1px solid var(--gray-200); padding: 0 20px; height: 64px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: var(--shadow-sm); }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon { width: 36px; height: 36px; background: var(--primary-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .brand-name { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-800); }
    .count-pill { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--primary); background: var(--primary-light); border: 1px solid rgba(92,88,246,0.2); padding: 6px 14px; border-radius: 20px; }
    .content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 32px 20px; gap: 24px; }
    #config-screen { display: flex; flex-direction: column; align-items: stretch; gap: 20px; width: 100%; max-width: 420px; }
    .config-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-md); border: 1px solid var(--gray-200); padding: 36px 28px; }
    .config-header { text-align: center; margin-bottom: 28px; }
    .config-badge { display: inline-flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--primary); background: var(--primary-light); padding: 6px 14px; border-radius: 20px; margin-bottom: 16px; }
    .config-title { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); line-height: 1.2; }
    .config-sub { font-size: 0.85rem; color: var(--gray-400); margin-top: 8px; line-height: 1.5; }
    .input-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-600); margin-bottom: 8px; display: block; }
    .url-input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 0.85rem; color: var(--gray-800); background: var(--gray-50); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .url-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(92,88,246,0.1); background: var(--white); }
    .url-input.error { border-color: var(--red); }
    .btn-primary { width: 100%; padding: 16px; margin-top: 8px; background: var(--primary); color: var(--white); border: none; border-radius: var(--radius-sm); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; box-shadow: 0 4px 14px rgba(92,88,246,0.3); -webkit-tap-highlight-color: transparent; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:active { transform: scale(0.98); }
    #idle-screen { display: none; flex-direction: column; align-items: stretch; gap: 16px; width: 100%; max-width: 420px; }
    .idle-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-md); border: 1px solid var(--gray-200); padding: 40px 28px 32px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 20px; }
    .scanner-illustration { width: 88px; height: 88px; background: var(--primary-light); border-radius: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
    .scanner-illustration::after { content: ''; position: absolute; inset: -6px; border-radius: 26px; border: 1.5px solid rgba(92,88,246,0.15); }
    .idle-title { font-size: 1.4rem; font-weight: 800; color: var(--gray-900); }
    .idle-sub { font-size: 0.9rem; color: var(--gray-400); line-height: 1.5; margin-top: -8px; }
    .server-row { display: flex; align-items: center; gap: 10px; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 10px; padding: 12px 16px; width: 100%; }
    .dot-live { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .server-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--gray-400); flex-shrink: 0; }
    .server-url { font-size: 0.75rem; color: var(--gray-600); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-secondary { width: 100%; padding: 14px; background: transparent; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); color: var(--gray-600); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: border-color 0.15s, color 0.15s; -webkit-tap-highlight-color: transparent; }
    .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
    #scanner-screen { display: none; flex-direction: column; align-items: stretch; gap: 20px; width: 100%; max-width: 420px; }
    .scan-status-strip { background: var(--white); border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); }
    .strip-left { display: flex; align-items: center; gap: 10px; }
    .live-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); animation: blink 1s ease-in-out infinite; }
    .live-dot.scanning { background: var(--green); }
    .live-dot.paused { background: var(--amber); animation: none; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    .strip-label { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-600); }
    .strip-count { font-size: 0.8rem; font-weight: 600; color: var(--primary); background: var(--primary-light); padding: 4px 12px; border-radius: 12px; }
    .cam-card { background: var(--gray-900); border-radius: var(--radius); overflow: hidden; position: relative; aspect-ratio: 1/1; box-shadow: var(--shadow-lg); }
    #cam-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #qr-canvas { display: none; }
    .vignette { position: absolute; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, rgba(15,23,42,0.6) 100%); pointer-events: none; }
    .corners { position: absolute; inset: 0; pointer-events: none; }
    .corners svg { width: 100%; height: 100%; }
    .scan-line { position: absolute; left: 16%; right: 16%; height: 2px; background: linear-gradient(90deg, transparent, var(--primary), transparent); box-shadow: 0 0 8px 2px rgba(92,88,246,0.5); animation: scanMove 2s ease-in-out infinite; }
    .scan-line.paused { animation-play-state: paused; opacity: 0; }
    @keyframes scanMove { 0%{top:16%;opacity:0}8%{opacity:1}92%{opacity:1}100%{top:84%;opacity:0} }
    .cam-hint { position: absolute; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .freeze-overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.72); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .freeze-overlay.visible { display: flex; }
    .freeze-spinner { width: 44px; height: 44px; border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .freeze-label { font-size: 0.85rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.8); }
    .status-card { background: var(--white); border-radius: var(--radius-sm); padding: 18px 20px; display: none; align-items: center; gap: 16px; box-shadow: var(--shadow-sm); animation: slideUp 0.2s ease; }
    @keyframes slideUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)} }
    .status-card.success { border: 1.5px solid #bbf7d0; background: var(--green-light); }
    .status-card.error   { border: 1.5px solid #fecaca; background: var(--red-light); }
    .status-card.warning { border: 1.5px solid #fde68a; background: var(--amber-light); }
    .s-dot { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .s-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 3px; }
    .success .s-title{color:#00875a} .error .s-title{color:#b91c1c} .warning .s-title{color:#b45309}
    .s-detail { font-size: 0.8rem; color: var(--gray-600); line-height: 1.4; }
    .btn-stop { width: 100%; padding: 16px; margin-top: 8px; background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); color: var(--gray-600); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; box-shadow: var(--shadow-sm); -webkit-tap-highlight-color: transparent; transition: border-color 0.15s, color 0.15s; }
    .btn-stop:hover { border-color: var(--red); color: var(--red); }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="17" width="3" height="3"/>
          <path d="M14 14h3v3"/><path d="M17 14h3v6h-3"/><path d="M14 20h3"/>
        </svg>
      </div>
      <span class="brand-name">Event Check-in</span>
    </div>
    <div class="count-pill" id="scan-badge">Ready</div>
  </div>

  <div class="content">
    <div id="config-screen">
      <div class="config-card">
        <div class="config-header">
          <div class="config-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Secure Scanner
          </div>
          <div class="config-title">Connect to Event</div>
          <div class="config-sub">Paste your Google Apps Script deployment URL to link this scanner to your attendance sheet.</div>
        </div>
        <label class="input-label" for="gas-url-input">Apps Script Web App URL</label>
        <input type="url" id="gas-url-input" class="url-input" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" autocorrect="off" spellcheck="false">
        <button class="btn-primary" id="btn-connect">Connect &amp; Start Scanning</button>
      </div>
    </div>

    <div id="idle-screen">
      <div class="idle-card">
        <div class="scanner-illustration">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#5c58f6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
            <line x1="3" y1="12" x2="21" y2="12" stroke-width="1.5" opacity="0.4"/>
          </svg>
        </div>
        <div>
          <div class="idle-title">Ready to Check-in</div>
          <div class="idle-sub">Open the camera to start scanning attendee QR codes instantly.</div>
        </div>
        <div class="server-row">
          <div class="dot-live"></div>
          <span class="server-label">Server</span>
          <span class="server-url" id="server-url-display">—</span>
        </div>
        <button class="btn-primary" id="btn-open-camera" style="margin-top:8px;">
          <span style="display:flex;align-items:center;justify-content:center;gap:10px">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            Open Camera
          </span>
        </button>
      </div>
      <button class="btn-secondary" id="btn-change-url">Change Server URL</button>
    </div>

    <div id="scanner-screen">
      <div class="scan-status-strip">
        <div class="strip-left">
          <div class="live-dot scanning" id="live-dot"></div>
          <span class="strip-label" id="strip-label">Scanning</span>
        </div>
        <span class="strip-count" id="strip-count">0 checked in</span>
      </div>
      <div class="cam-card">
        <video id="cam-video" autoplay playsinline muted></video>
        <div class="vignette"></div>
        <div class="corners">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 28 L18 18 L28 18" stroke="#5c58f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M72 18 L82 18 L82 28" stroke="#5c58f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M82 72 L82 82 L72 82" stroke="#5c58f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M28 82 L18 82 L18 72" stroke="#5c58f6" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="scan-line" id="scan-line"></div>
        <canvas id="qr-canvas"></canvas>
        <div class="cam-hint" id="cam-hint">Align QR code within the frame</div>
        <div class="freeze-overlay" id="freeze-overlay">
          <div class="freeze-spinner"></div>
          <div class="freeze-label">Verifying…</div>
        </div>
      </div>
      <div id="status-card" class="status-card">
        <div class="s-dot" id="s-dot"></div>
        <div class="s-body">
          <div class="s-title" id="s-title"></div>
          <div class="s-detail" id="s-detail"></div>
        </div>
      </div>
      <button class="btn-stop" id="btn-stop">Stop Scanner</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    const STORAGE_KEY = 'gas_checkin_url_v2';

    const configScreen  = document.getElementById('config-screen');
    const idleScreen    = document.getElementById('idle-screen');
    const scanScreen    = document.getElementById('scanner-screen');
    const gasInput      = document.getElementById('gas-url-input');
    const serverDisp    = document.getElementById('server-url-display');
    const badge         = document.getElementById('scan-badge');
    const video         = document.getElementById('cam-video');
    const canvas        = document.getElementById('qr-canvas');
    const ctx           = canvas.getContext('2d');
    const statusCard    = document.getElementById('status-card');
    const sDot          = document.getElementById('s-dot');
    const sTitle        = document.getElementById('s-title');
    const sDetail       = document.getElementById('s-detail');
    const liveDot       = document.getElementById('live-dot');
    const stripLabel    = document.getElementById('strip-label');
    const stripCount    = document.getElementById('strip-count');
    const scanLine      = document.getElementById('scan-line');
    const freezeOverlay = document.getElementById('freeze-overlay');
    const camHint       = document.getElementById('cam-hint');

    let gasUrl = '', stream = null, rafId = null;
    let isProcessing = false, scanCount = 0, statusTimeout = null;

    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { gasUrl = saved; showIdle(); } else { show(configScreen); }

    document.getElementById('btn-connect').addEventListener('click', () => {
      const val = gasInput.value.trim();
      if (!val.startsWith('https://script.google.com')) { gasInput.classList.add('error'); return; }
      gasInput.classList.remove('error');
      gasUrl = val;
      localStorage.setItem(STORAGE_KEY, gasUrl);
      showIdle();
    });

    document.getElementById('btn-change-url').addEventListener('click', () => {
      gasInput.value = gasUrl; hide(idleScreen); show(configScreen);
    });

    document.getElementById('btn-open-camera').addEventListener('click', openCamera);
    document.getElementById('btn-stop').addEventListener('click', stopCamera);

    function showIdle() {
      hide(configScreen); show(idleScreen);
      const short = gasUrl.replace('https://script.google.com/macros/s/','…/').replace('https://script.google.com/a/macros/','…/');
      serverDisp.textContent = short.length > 50 ? short.substring(0,50)+'…' : short;
    }

    async function openCamera() {
      hide(idleScreen); show(scanScreen);
      statusCard.style.display = 'none';
      setScanState('scanning');
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false });
        video.srcObject = stream; await video.play();
        canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
        decodeLoop();
      } catch (err) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          video.srcObject = stream; await video.play();
          canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
          decodeLoop();
        } catch (e2) { alert('Camera error: ' + e2.message); }
      }
    }

    function stopCamera() {
      cancelAnimationFrame(rafId); clearTimeout(statusTimeout);
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null; isProcessing = false;
      hide(scanScreen); showIdle();
    }

    function decodeLoop() {
      if (!stream) return;
      if (!isProcessing && video.readyState >= video.HAVE_ENOUGH_DATA) {
        if (video.videoWidth && video.videoWidth !== canvas.width) { canvas.width = video.videoWidth; canvas.height = video.videoHeight; }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
        if (code && code.data) { handleQR(code.data); return; }
      }
      rafId = requestAnimationFrame(() => setTimeout(decodeLoop, 100));
    }

    function handleQR(raw) {
      if (isProcessing) return;
      isProcessing = true;
      video.pause();
      setScanState('verifying');

      // Parse "checkin_id:MBA00100|token:secure_token_123"
      let id, token;
      try {
        const parts = raw.split('|');
        if (parts.length < 2) throw new Error('bad format');
        id    = parts[0].substring(parts[0].indexOf(':') + 1).trim();
        token = parts[1].substring(parts[1].indexOf(':') + 1).trim();
        if (!id || !token) throw new Error('missing fields');
      } catch (e) {
        setScanState('scanning');
        showResult('error', 'Invalid QR Code', 'Not a valid event ticket');
        scheduleReset(3000);
        return;
      }

      // Build a plain-text body — NOT application/json to avoid preflight
      // Use a simple key=value format that GAS reliably receives as e.postData.contents
      const bodyStr = JSON.stringify({ id: id, token: token });

      fetch(gasUrl, {
        method: 'POST',
        // NO Content-Type header at all → browser sends as text/plain → no preflight
        // GAS receives raw string in e.postData.contents
        headers: { 'Content-Type': 'text/plain' },
        body: bodyStr
      })
      .then(r => r.text())
      .then(text => {
        const clean = text.replace(/^\uFEFF/, '').trim();
        const res = JSON.parse(clean);
        setScanState('scanning');
        if (res.success) {
          scanCount++;
          badge.textContent = scanCount + ' Checked In';
          stripCount.textContent = scanCount + ' checked in';
          showResult('success', 'Check-in Successful', res.message);
        } else {
          const type = res.message && res.message.toLowerCase().includes('already') ? 'warning' : 'error';
          showResult(type, 'Check-in Denied', res.message);
        }
        scheduleReset(3500);
      })
      .catch(() => {
        setScanState('scanning');
        showResult('error', 'Server Unreachable', 'Check your URL or connection');
        scheduleReset(3000);
      });
    }

    function setScanState(state) {
      if (state === 'verifying') {
        liveDot.className = 'live-dot paused'; stripLabel.textContent = 'Verifying';
        scanLine.classList.add('paused'); freezeOverlay.classList.add('visible'); camHint.style.opacity = '0';
      } else {
        liveDot.className = 'live-dot scanning'; stripLabel.textContent = 'Scanning';
        scanLine.classList.remove('paused'); freezeOverlay.classList.remove('visible'); camHint.style.opacity = '1';
        if (video.paused && stream) video.play();
        if (stream) rafId = requestAnimationFrame(() => setTimeout(decodeLoop, 300));
      }
    }

    function showResult(type, title, detail) {
      clearTimeout(statusTimeout);
      const icons = { success: '✅', error: '❌', warning: '⚠️' };
      sDot.textContent = icons[type] || '';
      sTitle.textContent = title; sDetail.textContent = detail;
      statusCard.className = 'status-card ' + type;
      statusCard.style.display = 'flex';
    }

    function scheduleReset(ms) {
      statusTimeout = setTimeout(() => { statusCard.style.display = 'none'; isProcessing = false; }, ms);
    }

    function show(el) { el.style.display = 'flex'; }
    function hide(el) { el.style.display = 'none'; }
  })();
  </script>
</body>
</html>
