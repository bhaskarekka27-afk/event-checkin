<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Check-in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ... (KEEP ALL YOUR EXISTING CSS HERE) ... */
    /* Add this helper to ensure clean transitions */
    .screen { display: none; }
    .screen.active { display: flex; }
  </style>
</head>
<body>
  <script>
  (function () {
    // ... (KEEP ALL YOUR EXISTING JS VARIABLES) ...

    // --- UI HELPER: THE "BLANK SCREEN" FIX ---
    function navigateTo(screenId) {
        // 1. Hide everything
        ['config-screen', 'idle-screen', 'scanner-screen', 'manual-screen', 'data-screen'].forEach(id => {
            document.getElementById(id).style.display = 'none';
        });
        
        // 2. Show requested
        const target = document.getElementById(screenId);
        if(target) target.style.display = 'flex';
        
        // 3. Close menus/popups
        closeMenu();
        hidePopup();
    }

    // --- UPDATED NAVIGATION CALLS ---
    document.getElementById('nav-scanner').addEventListener('click', () => {
        if(!gasUrl) navigateTo('config-screen');
        else navigateTo('idle-screen');
    });

    document.getElementById('nav-data').addEventListener('click', () => {
        openDataScreen(); // This function now handles its own internal navigation
    });

    // --- STOP CAMERA FIX ---
    function stopScannerSystem() {
        cancelAnimationFrame(rafId); 
        if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
        video.srcObject = null; 
        isProcessing = false;
        hidePopup();
        navigateTo('idle-screen');
    }

    // --- DATA FETCHING FIX ---
    function openDataScreen() {
        navigateTo('data-screen'); // Uses new navigation helper
        // ... (rest of your fetch logic) ...
    }
  })();
  </script>
</body>
</html>
