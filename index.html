<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Check-in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* CLAT Mentorship Dashboard Theme Colors */
      --primary: #5c58f6;       /* The distinct Indigo/Purple */
      --primary-hover: #4641d4;
      --primary-light: #eff0fe;
      --green: #00b075;         /* Completed/Done Green */
      --green-light: #e6f7f1;
      --red: #ef4444;           /* Missed Red */
      --red-light: #fef2f2;
      --amber: #f59e0b;
      --amber-light: #fffbeb;
      --gray-50: #f8f9fa;       /* Dashboard background */
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --white: #ffffff;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 16px rgba(92, 88, 246, 0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 32px rgba(92, 88, 246, 0.12), 0 2px 8px rgba(0,0,0,0.06);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      width: 100%; height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--gray-900);
    }

    .count-pill {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--primary);
      padding: 6px 14px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(92, 88, 246, 0.3);
    }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 16px;
    }

    /* ── CONFIG / IDLE SCREEN ── */
    #config-screen, #idle-screen {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }

    .config-card, .idle-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-200);
      padding: 32px 24px;
    }

    .idle-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }

    .config-header { text-align: center; margin-bottom: 24px; }
    
    .config-title, .idle-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--gray-900);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    .config-sub, .idle-sub {
      font-size: 0.85rem;
      color: var(--gray-400);
      margin-top: 8px;
      line-height: 1.5;
    }

    .input-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gray-600);
      margin-bottom: 8px;
      display: block;
    }

    .url-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: 'Inter', monospace;
      font-size: 0.8rem;
      color: var(--gray-800);
      background: var(--gray-50);
      outline: none;
      transition: all 0.2s;
    }

    .url-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); background: var(--white); }
    .url-input.error { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-light); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 12px rgba(92, 88, 246, 0.25);
    }

    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 6px 16px rgba(92, 88, 246, 0.35); }
    .btn-primary:active { transform: scale(0.98); }

    .server-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      width: 100%;
    }

    .dot-live {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px var(--green-light);
    }

    .server-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    .server-url {
      font-size: 0.75rem;
      color: var(--gray-600);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn-secondary {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      color: var(--gray-600);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }

    /* ── SCANNER SCREEN ── */
    #scanner-screen {
      display: none;
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }

    .scan-status-strip {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }

    .strip-left { display: flex; align-items: center; gap: 10px; }

    .live-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1s ease-in-out infinite;
    }
    .live-dot.scanning { background: var(--green); }
    .live-dot.paused   { background: var(--amber); animation: none; }

    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .strip-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--gray-800);
    }

    .strip-count {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gray-600);
    }

    /* Camera viewport */
    .cam-card {
      background: var(--gray-900);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      aspect-ratio: 1 / 1;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-200);
    }

    #cam-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    #qr-canvas { display: none; }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(15,23,42,0.5) 100%);
      pointer-events: none;
    }

    .corners { position: absolute; inset: 0; pointer-events: none; }
    .corners svg { width: 100%; height: 100%; }

    .scan-line {
      position: absolute;
      left: 16%; right: 16%;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 10px 2px rgba(92, 88, 246, 0.6);
      animation: scanMove 2s ease-in-out infinite;
    }
    .scan-line.paused { display: none; }

    @keyframes scanMove {
      0%   { top: 16%; opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 1; }
      100% { top: 84%; opacity: 0; }
    }

    .cam-hint {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.4);
      padding: 6px 0;
    }

    /* Freeze overlay — shown while verifying */
    .freeze-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,23,42,0.4);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }

    .freeze-overlay.visible { display: flex; }

    .freeze-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STATUS CARD ── */
    .status-card {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 16px;
      display: none;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-md);
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .status-card.success { border-left: 6px solid var(--green); }
    .status-card.error   { border-left: 6px solid var(--red); }
    .status-card.warning { border-left: 6px solid var(--amber); }

    .s-dot {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .success .s-dot { background: var(--green-light); color: var(--green); }
    .error   .s-dot { background: var(--red-light); color: var(--red); }
    .warning .s-dot { background: var(--amber-light); color: var(--amber); }

    .s-title {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--gray-900);
      margin-bottom: 2px;
    }
    .s-detail { font-size: 0.8rem; color: var(--gray-600); }

    .btn-stop {
      width: 100%;
      padding: 14px;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      color: var(--red);
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s;
    }
    .btn-stop:hover { background: var(--red-light); border-color: var(--red); }

  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <span class="brand-name">CLAT Mentorship Check-in</span>
    </div>
    <div class="count-pill" id="scan-badge">System Ready</div>
  </div>

  <div class="content">

    <div id="config-screen">
      <div class="config-card">
        <div class="config-header">
          <div class="config-title">Connect Backend</div>
          <div class="config-sub">Enter your Apps Script deployment URL.</div>
        </div>
        <div style="margin-bottom:20px">
          <label class="input-label" for="gas-url-input">Web App URL</label>
          <input type="url" id="gas-url-input" class="url-input" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
        </div>
        <button class="btn-primary" id="btn-connect">Connect & Save</button>
      </div>
    </div>

    <div id="idle-screen">
      <div class="idle-card">
        <div class="idle-title">Ready to Scan</div>
        <div class="idle-sub">Open the camera to begin processing attendee QR codes.</div>
        
        <div class="server-row">
          <div class="dot-live"></div>
          <span class="server-label">Link</span>
          <span class="server-url" id="server-url-display">—</span>
        </div>
        <button class="btn-primary" id="btn-open-camera">📷 Start Camera Feed</button>
      </div>
      <button class="btn-secondary" id="btn-change-url">Update Backend URL</button>
    </div>

    <div id="scanner-screen">

      <div class="scan-status-strip">
        <div class="strip-left">
          <div class="live-dot scanning" id="live-dot"></div>
          <span class="strip-label" id="strip-label">Camera Active</span>
        </div>
        <span class="strip-count" id="strip-count">0 Scanned</span>
      </div>

      <div class="cam-card">
        <video id="cam-video" autoplay playsinline muted></video>
        <div class="vignette"></div>

        <div class="corners">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 28 L18 18 L28 18" stroke="var(--primary)" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M72 18 L82 18 L82 28" stroke="var(--primary)" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M82 72 L82 82 L72 82" stroke="var(--primary)" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M28 82 L18 82 L18 72" stroke="var(--primary)" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </div>

        <div class="scan-line" id="scan-line"></div>
        <canvas id="qr-canvas"></canvas>
        <div class="cam-hint" id="cam-hint">Align QR code within the frame</div>

        <div class="freeze-overlay" id="freeze-overlay">
          <div class="freeze-spinner"></div>
        </div>
      </div>

      <div id="status-card" class="status-card">
        <div class="s-dot" id="s-dot"></div>
        <div>
          <div class="s-title" id="s-title"></div>
          <div class="s-detail" id="s-detail"></div>
        </div>
      </div>

      <button class="btn-stop" id="btn-stop">Close Camera</button>
    </div>

  </div>

  <script>
  (function () {
    'use strict';

    const STORAGE_KEY = 'gas_checkin_url_v2';

    const configScreen = document.getElementById('config-screen');
    const idleScreen   = document.getElementById('idle-screen');
    const scanScreen   = document.getElementById('scanner-screen');
    const gasInput     = document.getElementById('gas-url-input');
    const serverDisp   = document.getElementById('server-url-display');
    const badge        = document.getElementById('scan-badge');
    const video        = document.getElementById('cam-video');
    const canvas       = document.getElementById('qr-canvas');
    const ctx          = canvas.getContext('2d');
    const statusCard   = document.getElementById('status-card');
    const sDot         = document.getElementById('s-dot');
    const sTitle       = document.getElementById('s-title');
    const sDetail      = document.getElementById('s-detail');
    const liveDot      = document.getElementById('live-dot');
    const stripLabel   = document.getElementById('strip-label');
    const stripCount   = document.getElementById('strip-count');
    const scanLine     = document.getElementById('scan-line');
    const freezeOverlay= document.getElementById('freeze-overlay');
    const camHint      = document.getElementById('cam-hint');

    let gasUrl        = '';
    let stream        = null;
    let rafId         = null;
    let isProcessing  = false;
    let scanCount     = 0;
    let statusTimeout = null;

    // Init
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { gasUrl = saved; showIdle(); }
    else { show(configScreen); }

    // Config Events
    document.getElementById('btn-connect').addEventListener('click', () => {
      const val = gasInput.value.trim();
      if (!val.startsWith('https://script.google.com')) {
        gasInput.classList.add('error');
        return;
      }
      gasInput.classList.remove('error');
      gasUrl = val;
      localStorage.setItem(STORAGE_KEY, gasUrl);
      showIdle();
    });

    document.getElementById('btn-change-url').addEventListener('click', () => {
      gasInput.value = gasUrl;
      hide(idleScreen); show(configScreen);
    });

    document.getElementById('btn-open-camera').addEventListener('click', openCamera);
    document.getElementById('btn-stop').addEventListener('click', stopCamera);

    function showIdle() {
      hide(configScreen); show(idleScreen);
      const short = gasUrl.replace('https://script.google.com/macros/s/', '…/').replace('https://script.google.com/a/macros/', '…/');
      serverDisp.textContent = short.length > 40 ? short.substring(0,40)+'…' : short;
    }

    async function openCamera() {
      hide(idleScreen); show(scanScreen);
      statusCard.style.display = 'none';
      setScanState('scanning');

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }, audio: false
        });
        video.srcObject = stream;
        await video.play();
        canvas.width  = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        decodeLoop();
      } catch (err) {
        alert("Camera blocked or unavailable. Please check permissions.");
        stopCamera();
      }
    }

    function stopCamera() {
      cancelAnimationFrame(rafId);
      clearTimeout(statusTimeout);
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
      isProcessing = false;
      hide(scanScreen); showIdle();
    }

    function decodeLoop() {
      if (!stream) return;
      if (!isProcessing && video.readyState >= video.HAVE_ENOUGH_DATA) {
        if (video.videoWidth && video.videoWidth !== canvas.width) {
          canvas.width  = video.videoWidth; canvas.height = video.videoHeight;
        }
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
        
        if (code && code.data) {
          handleQR(code.data);
          return; // Stop requesting frames while handling
        }
      }
      rafId = requestAnimationFrame(() => setTimeout(decodeLoop, 100));
    }

    function handleQR(raw) {
      if (isProcessing) return;
      isProcessing = true;
      
      // Physically pause the video feed so the UI freezes
      video.pause();
      setScanState('verifying');

      let id, token;
      try {
        const parts = raw.split('|');
        if (parts.length < 2) throw new Error('bad format');
        id    = parts[0].split(':')[1];
        token = parts[1].split(':')[1];
        if (!id || !token) throw new Error('missing fields');
      } catch (e) {
        showResult('error', 'Invalid QR Code', 'Not recognized as an event ticket');
        scheduleReset(3000);
        return;
      }

      fetch(gasUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'payload=' + encodeURIComponent(JSON.stringify({ id, token })),
        redirect: 'follow'
      })
      .then(r => r.text())
      .then(text => {
        const res = JSON.parse(text.trim());
        if (res.success) {
          scanCount++;
          badge.textContent = scanCount + ' Processed';
          stripCount.textContent = scanCount + ' Scanned';
          showResult('success', 'Checked In', res.message);
        } else {
          const type = res.message.includes('already') ? 'warning' : 'error';
          showResult(type, 'Check-in Denied', res.message);
        }
        scheduleReset(3500);
      })
      .catch(() => {
        showResult('error', 'Network Error', 'Check your connection or URL');
        scheduleReset(3000);
      });
    }

    function setScanState(state) {
      if (state === 'verifying') {
        liveDot.className = 'live-dot paused';
        stripLabel.textContent = 'Verifying Record...';
        scanLine.classList.add('paused');
        freezeOverlay.classList.add('visible');
        camHint.style.opacity = '0';
      } else {
        liveDot.className = 'live-dot scanning';
        stripLabel.textContent = 'Camera Active';
        scanLine.classList.remove('paused');
        freezeOverlay.classList.remove('visible');
        camHint.style.opacity = '1';
        
        // Ensure video resumes playing
        if (video.paused && stream) video.play(); 
        
        // Resume continuous decoding
        if (stream) rafId = requestAnimationFrame(() => setTimeout(decodeLoop, 300));
      }
    }

    function showResult(type, title, detail) {
      clearTimeout(statusTimeout);
      const icons = { success: '✔', error: '✖', warning: '⚠' };
      sDot.textContent = icons[type] || '';
      sTitle.textContent  = title;
      sDetail.textContent = detail;
      statusCard.className = 'status-card ' + type;
      statusCard.style.display = 'flex';
    }

    function scheduleReset(ms) {
      statusTimeout = setTimeout(() => {
        statusCard.style.display = 'none';
        isProcessing = false;
        setScanState('scanning'); // Unfreezes the video and restarts loop
      }, ms);
    }

    function show(el) { el.style.display = 'flex'; }
    function hide(el) { el.style.display = 'none'; }

  })();
  </script>
</body>
</html>
